<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>時鐘練習 可打印工作紙</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  padding: 40px 30px;
  max-width: 900px;
  margin: 0 auto;
  color: #1e293b;
}
h1 { text-align: center; font-size: 28px; margin-bottom: 4px; }
.sub { text-align: center; color: #6b7280; font-size: 14px; margin-bottom: 24px; border-bottom: 2px solid #7c3aed; padding-bottom: 12px; }
.grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
@media print { body { padding: 20px; } .grid { gap: 16px; } }
.q-card {
  border: 2px solid #e2e8f0; border-radius: 16px; padding: 20px;
  display: flex; flex-direction: column; align-items: center;
  break-inside: avoid; page-break-inside: avoid;
}
.q-num {
  align-self: flex-start; font-weight: 700; color: #7c3aed;
  font-size: 14px; margin-bottom: 8px;
}
.clock-face {
  width: 140px; height: 140px; border-radius: 50%; border: 5px solid #1e293b;
  position: relative; margin: 4px auto 4px; background: #fff;
  box-shadow: inset 0 0 8px rgba(0,0,0,.08);
  flex-shrink: 0;
}
.clock-center {
  width: 8px; height: 8px; border-radius: 50%; background: #1e293b;
  position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); z-index: 5;
}
.clock-hour {
  position: absolute; bottom: 50%; left: 50%; transform-origin: bottom center;
  width: 5px; height: 38px; background: #1e293b; border-radius: 3px; z-index: 3;
}
.clock-minute {
  position: absolute; bottom: 50%; left: 50%; transform-origin: bottom center;
  width: 3px; height: 52px; background: #dc2626; border-radius: 2px; z-index: 2;
}
.clock-mark { position: absolute; font-size: 11px; font-weight: 700; color: #4b5563; }
.answer-line {
  width: 80%; border-bottom: 2px dashed #cbd5e1; margin-top: 12px;
  text-align: center; padding-bottom: 4px; font-size: 15px; color: #94a3b8;
  min-height: 28px;
}
@media print { .no-print { display: none; } }
.print-btn {
  display: block; margin: 0 auto 20px; padding: 12px 32px; font-size: 18px;
  background: #7c3aed; color: #fff; border: none; border-radius: 12px; cursor: pointer;
}
.print-btn:active { transform: scale(.95); }
@page { margin: 15mm; }
</style>
</head>
<body>
<button class="print-btn no-print" onclick="window.print()">列印 / 儲存為 PDF</button>
<h1>&#x1F556; 時鐘練習</h1>
<div class="sub">看看時鐘，寫出正確的時間（正點 / 半點）</div>
<div class="grid" id="clock-grid"></div>
<script>
const clocks = [
  { h: 3, m: 0 }, { h: 6, m: 0 }, { h: 9, m: 0 },
  { h: 12, m: 0 }, { h: 2, m: 0 }, { h: 5, m: 0 },
  { h: 7, m: 0 }, { h: 10, m: 0 },
  { h: 3, m: 30 }, { h: 6, m: 30 }, { h: 9, m: 30 },
  { h: 12, m: 30 }, { h: 2, m: 30 }, { h: 5, m: 30 },
  { h: 7, m: 30 }, { h: 10, m: 30 }
];

function renderClock(h, m) {
  const hourAngle = (h % 12) * 30 + (m / 60) * 30;
  const minAngle = m * 6;
  let marks = '';
  for (let i = 1; i <= 12; i++) {
    const angle = i * 30 - 90;
    const rad = angle * Math.PI / 180;
    const r = 56;
    const x = Math.round(70 + r * Math.cos(rad));
    const y = Math.round(70 + r * Math.sin(rad));
    marks += `<div class="clock-mark" style="left:${x-5}px;top:${y-7}px;">${i}</div>`;
  }
  return `<div class="clock-face">
    ${marks}
    <div class="clock-hour" style="transform:translateX(-50%) rotate(${hourAngle}deg)"></div>
    <div class="clock-minute" style="transform:translateX(-50%) rotate(${minAngle}deg)"></div>
    <div class="clock-center"></div>
  </div>`;
}

const grid = document.getElementById('clock-grid');
clocks.forEach((c, i) => {
  const card = document.createElement('div');
  card.className = 'q-card';
  card.innerHTML = `
    <div class="q-num">${i + 1}.</div>
    ${renderClock(c.h, c.m)}
    <div class="answer-line">___ 點 ___ 分</div>
  `;
  grid.appendChild(card);
});
</script>
</body>
</html>
