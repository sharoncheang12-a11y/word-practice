<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>圖案規律練習 可打印工作紙</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  padding: 40px 30px;
  max-width: 900px;
  margin: 0 auto;
  color: #1e293b;
}
h1 { text-align: center; font-size: 28px; margin-bottom: 4px; }
.sub { text-align: center; color: #6b7280; font-size: 14px; margin-bottom: 24px; border-bottom: 2px solid #7c3aed; padding-bottom: 12px; }
.grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
@media print { body { padding: 20px; } .grid { gap: 14px; } }
.q-card {
  border: 2px solid #e2e8f0; border-radius: 16px; padding: 20px 16px;
  display: flex; flex-direction: column; align-items: center;
  break-inside: avoid; page-break-inside: avoid;
  min-height: 120px;
}
.q-num {
  align-self: flex-start; font-weight: 700; color: #7c3aed;
  font-size: 14px; margin-bottom: 10px;
}
.pattern-row {
  display: flex; gap: 10px; justify-content: center; align-items: center;
  flex-wrap: wrap; margin: 8px 0;
}
.pattern-box {
  width: 48px; height: 48px;
  border: 2px solid #d1d5db; border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 28px; background: #f9fafb;
}
.pattern-box.empty {
  border: 2px dashed #ef4444; background: #fef2f2;
  color: #ef4444; font-size: 20px; font-weight: 700;
}
.answer-area {
  width: 90%; margin-top: 10px; padding-top: 10px;
  border-top: 1px dashed #e2e8f0; text-align: center;
}
.answer-label { font-size: 13px; color: #94a3b8; margin-bottom: 4px; }
.answer-box {
  display: inline-block; width: 48px; height: 48px;
  border: 2px dashed #7c3aed; border-radius: 8px;
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 28px; background: #f5f3ff;
}
@media print { .no-print { display: none; } }
.print-btn {
  display: block; margin: 0 auto 20px; padding: 12px 32px; font-size: 18px;
  background: #7c3aed; color: #fff; border: none; border-radius: 12px; cursor: pointer;
}
.print-btn:active { transform: scale(.95); }
@page { margin: 15mm; }
</style>
</head>
<body>
<button class="print-btn no-print" onclick="window.print()">列印 / 儲存為 PDF</button>
<h1>&#x2B55; 圖案規律練習</h1>
<div class="sub">觀察圖案的排列規律，在空格內畫上正確的答案</div>
<div class="grid" id="pattern-grid"></div>
<script>
const patterns = [
  { seq: ['●', '○', '●', '○', '●'], ans: '○', label: '填上答案' },
  { seq: ['⬛', '⬜', '⬛', '⬜', '⬛'], ans: '⬜', label: '填上答案' },
  { seq: ['▲', '▲', '●', '▲', '▲'], ans: '●', label: '填上答案' },
  { seq: ['★', '★', '☆', '★', '★'], ans: '☆', label: '填上答案' },
  { seq: ['❤', '💙', '❤', '💙', '❤'], ans: '💙', label: '填上答案' },
  { seq: ['●', '●', '○', '●', '●'], ans: '○', label: '填上答案' },
  { seq: ['🔺', '🔻', '🔺', '🔻', '🔺'], ans: '🔻', label: '填上答案' },
  { seq: ['⬆', '⬇', '⬆', '⬇', '⬆'], ans: '⬇', label: '填上答案' },
  { seq: ['A', 'A', 'B', 'A', 'A'], ans: 'B', label: '填上答案' },
  { seq: ['1', '2', '1', '2', '1'], ans: '2', label: '填上答案' },
  { seq: ['△', '△', '○', '△', '△'], ans: '○', label: '填上答案' },
  { seq: ['☆', '○', '☆', '○', '☆'], ans: '○', label: '填上答案' },
  { seq: ['●', '⬛', '●', '⬛', '●'], ans: '⬛', label: '填上答案' },
  { seq: ['♦', '♣', '♦', '♣', '♦'], ans: '♣', label: '填上答案' },
  { seq: ['A', 'B', 'C', 'A', 'B'], ans: 'C', label: '填上答案' },
  { seq: ['🔴', '🔵', '🔴', '🔵', '🔴'], ans: '🔵', label: '填上答案' }
];

function shuffle(a) { const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];} return b; }

const grid = document.getElementById('pattern-grid');
const selected = shuffle(patterns).slice(0, 12);

selected.forEach((p, idx) => {
  const card = document.createElement('div');
  card.className = 'q-card';

  let boxesHtml = '';
  p.seq.forEach((s, si) => {
    if (si === p.seq.length - 1) {
      boxesHtml += `<div class="pattern-box empty">?</div>`;
    } else {
      boxesHtml += `<div class="pattern-box">${s}</div>`;
    }
  });

  card.innerHTML = `
    <div class="q-num">${idx + 1}.</div>
    <div class="pattern-row">${boxesHtml}</div>
    <div class="answer-area">
      <div class="answer-label">請畫出下一個圖案</div>
      <div class="answer-box"></div>
    </div>
  `;
  grid.appendChild(card);
});
</script>
</body>
</html>
